Hatsune Miku:
  # Core palette
  primary-color: "#00d7d7"
  accent-color: "#ff5fd2"
  dark-primary-color: "#00a6b3"
  light-primary-color: "#7ffcff"
  primary-background-color: "#07131f"
  secondary-background-color: "#0d2030"
  lovelace-background: "linear-gradient(rgba(7, 19, 31, 0.54), rgba(7, 19, 31, 0.72)), url('/local/hatsune-miku-background.webp') center / cover no-repeat fixed"
  ha-view-background: "linear-gradient(rgba(7, 19, 31, 0.54), rgba(7, 19, 31, 0.72)), url('/local/hatsune-miku-background.webp') center / cover no-repeat fixed"
  lovelace-background-color: "#07131f"
  divider-color: "rgba(127, 252, 255, 0.16)"

  # Text
  primary-text-color: "#eefbff"
  secondary-text-color: "#a9dbe5"
  text-primary-color: "#06111c"
  disabled-text-color: "#5d7b87"

  # App chrome
  app-header-background-color: "#07131f"
  app-header-text-color: "#eefbff"
  app-header-selection-bar-color: "#ff5fd2"
  app-header-edit-background-color: "#0d2030"
  app-header-edit-text-color: "#eefbff"

  # Sidebar
  sidebar-background-color: "rgba(7, 19, 31, 0.58)"
  sidebar-backdrop-filter: "blur(18px) saturate(1.35)"
  sidebar-box-shadow: "inset -1px 0 0 rgba(127, 252, 255, 0.16)"
  sidebar-icon-color: "#7ffcff"
  sidebar-text-color: "#d7f9ff"
  sidebar-selected-background-color: "rgba(0, 215, 215, 0.16)"
  sidebar-selected-icon-color: "#ff5fd2"
  sidebar-selected-text-color: "#ffffff"
  sidebar-menu-button-text-color: "#a9dbe5"

  # Cards and surfaces
  card-background-color: "#102638"
  ha-card-background: "linear-gradient(145deg, rgba(16, 38, 56, 0.88), rgba(9, 24, 38, 0.90))"
  ha-card-border-color: "rgba(127, 252, 255, 0.20)"
  ha-card-border-radius: "16px"
  ha-card-box-shadow: "0 12px 32px rgba(0, 0, 0, 0.30), 0 0 20px rgba(0, 215, 215, 0.10)"
  ha-card-header-color: "#eefbff"
  ha-card-border-width: "1px"
  miku-active-card-background: "linear-gradient(145deg, #ff5fd2, #ff86df)"
  miku-active-card-border-color: "rgba(255, 255, 255, 0.42)"
  miku-active-card-text-color: "#18071a"
  miku-active-card-icon-color: "#18071a"
  miku-active-card-shadow: "0 14px 34px rgba(255, 95, 210, 0.36), 0 0 22px rgba(255, 95, 210, 0.28)"

  # Controls
  # Pixel icon pack
  # Add this globally in configuration.yaml under frontend.extra_module_url.
  # Lovelace resources load too late for Home Assistant shell areas like the sidebar.
  # Then use icons with the miku: prefix, for example miku:home, miku:lightbulb, or miku:battery.
  miku-iconset-resource: "/local/hatsune-miku-icons/hatsune-miku-iconset.js"
  miku-icon-prefix: "miku"
  miku-icon-preview: "/local/hatsune-miku-icons/all-material-icons/preview.html"
  miku-pixel-icon-color: "#00e5d4"
  miku-pixel-icon-active-color: "#ff5fd2"
  paper-item-icon-color: "#00e5d4"
  paper-item-icon-active-color: "#ff5fd2"
  paper-item-icon_-_color: "#00e5d4"
  paper-slider-knob-color: "#ff5fd2"
  paper-slider-knob-start-color: "#ff5fd2"
  paper-slider-pin-color: "#ff5fd2"
  paper-slider-active-color: "#00d7d7"
  paper-slider-container-color: "#27465a"
  switch-checked-button-color: "#ff5fd2"
  switch-checked-track-color: "rgba(255, 95, 210, 0.45)"
  switch-unchecked-button-color: "#83a8b4"
  switch-unchecked-track-color: "#27465a"
  mdc-theme-primary: "#00d7d7"
  mdc-theme-secondary: "#ff5fd2"
  mdc-theme-surface: "#102638"
  mdc-theme-background: "#07131f"
  mdc-theme-on-primary: "#06111c"
  mdc-theme-on-secondary: "#06111c"
  mdc-theme-on-surface: "#eefbff"

  # Inputs, selects, and dropdown menus
  color-scheme: "dark"
  ha-color-form-background: "#102638"
  ha-color-form-background-hover: "#173349"
  ha-color-form-background-disabled: "#0d2030"
  ha-color-form-ink-color: "#eefbff"
  input-fill-color: "#102638"
  input-ink-color: "#eefbff"
  input-label-ink-color: "#a9dbe5"
  input-disabled-fill-color: "#0d2030"
  input-disabled-ink-color: "#6f8f9a"
  input-disabled-label-ink-color: "#6f8f9a"
  input-idle-line-color: "rgba(127, 252, 255, 0.34)"
  input-hover-line-color: "#00d7d7"
  input-dropdown-icon-color: "#7ffcff"
  mdc-select-fill-color: "#102638"
  mdc-select-ink-color: "#eefbff"
  mdc-select-label-ink-color: "#a9dbe5"
  mdc-select-dropdown-icon-color: "#7ffcff"
  mdc-select-idle-line-color: "rgba(127, 252, 255, 0.34)"
  mdc-select-hover-line-color: "#00d7d7"
  mdc-select-focused-label-color: "#00d7d7"
  mdc-text-field-fill-color: "#102638"
  mdc-text-field-ink-color: "#eefbff"
  mdc-text-field-label-ink-color: "#a9dbe5"
  mdc-text-field-idle-line-color: "rgba(127, 252, 255, 0.34)"
  mdc-text-field-hover-line-color: "#00d7d7"
  mdc-text-field-focused-label-color: "#00d7d7"
  mdc-menu-surface-fill-color: "#102638"
  mdc-list-item-graphic-ink-color: "#00e5d4"
  mdc-list-item-meta-ink-color: "#a9dbe5"
  mdc-list-item-primary-text-color: "#eefbff"
  mdc-list-item-secondary-text-color: "#a9dbe5"
  paper-listbox-background-color: "#102638"
  paper-dropdown-menu-color: "#eefbff"
  md-filled-select-text-field-container-color: "#102638"
  md-filled-select-text-field-hover-container-color: "#173349"
  md-filled-select-text-field-focus-container-color: "#102638"
  md-filled-select-text-field-disabled-container-color: "#0d2030"
  md-filled-select-text-field-input-text-color: "#eefbff"
  md-filled-select-text-field-label-text-color: "#a9dbe5"
  md-filled-select-text-field-supporting-text-color: "#a9dbe5"
  md-filled-select-text-field-trailing-icon-color: "#7ffcff"
  md-filled-select-text-field-focus-active-indicator-color: "#00d7d7"
  md-filled-select-text-field-hover-active-indicator-color: "#00d7d7"
  md-filled-text-field-container-color: "#102638"
  md-filled-text-field-hover-container-color: "#173349"
  md-filled-text-field-focus-container-color: "#102638"
  md-filled-text-field-disabled-container-color: "#0d2030"
  md-filled-text-field-input-text-color: "#eefbff"
  md-filled-text-field-label-text-color: "#a9dbe5"
  md-filled-text-field-supporting-text-color: "#a9dbe5"
  md-filled-text-field-focus-active-indicator-color: "#00d7d7"
  md-filled-text-field-hover-active-indicator-color: "#00d7d7"
  md-menu-container-color: "#102638"
  md-menu-item-label-text-color: "#eefbff"
  md-menu-item-supporting-text-color: "#a9dbe5"

  # State colors
  state-icon-color: "#00e5d4"
  state-icon-active-color: "#ff5fd2"
  state-icon-unavailable-color: "#4b6670"
  state-active-color: "#ff5fd2"
  state-light-active-color: "#ff5fd2"
  state-light-color: "#ff5fd2"
  state-light-on-color: "#ff5fd2"
  state-switch-active-color: "#ff5fd2"
  state-input_boolean-active-color: "#ff5fd2"
  state-binary_sensor-active-color: "#ff5fd2"
  state-fan-active-color: "#ff5fd2"
  state-script-active-color: "#ff5fd2"
  state-scene-active-color: "#ff5fd2"
  state-person-home-color: "#00f5e5"
  state-person-not-home-color: "#ff5fd2"
  state-cover-open-color: "#00d7d7"
  state-cover-closed-color: "#8fb9c5"

  # Labels and badges
  label-badge-background-color: "#102638"
  label-badge-text-color: "#eefbff"
  label-badge-red: "#ff5f8f"
  label-badge-green: "#00f5a8"
  label-badge-blue: "#00d7d7"
  label-badge-yellow: "#ffe66d"
  success-color: "#00f5a8"
  rgb-success-color: "0, 245, 168"

  # Tables, dialogs, and editors
  table-row-background-color: "#102638"
  table-row-alternative-background-color: "#0d2030"
  material-background-color: "#07131f"
  material-secondary-background-color: "#102638"
  mdc-dialog-scrim-color: "rgba(3, 8, 14, 0.72)"
  mdc-dialog-heading-ink-color: "#eefbff"
  mdc-dialog-content-ink-color: "#a9dbe5"
  code-editor-background-color: "#07131f"
  codemirror-property: "#7ffcff"
  codemirror-keyword: "#ff5fd2"
  codemirror-string: "#ffe66d"

  # Energy and charts
  energy-grid-consumption-color: "#00d7d7"
  energy-grid-return-color: "#ff5fd2"
  energy-solar-color: "#ffe66d"
  energy-non-fossil-color: "#00f5a8"
  graph-color-1: "#00d7d7"
  graph-color-2: "#ff5fd2"
  graph-color-3: "#ffe66d"
  graph-color-4: "#00f5a8"
  graph-color-5: "#8a7cff"

  # Anime-inspired polish
  mush-rgb-primary: "0, 215, 215"
  mush-rgb-accent: "255, 95, 210"
  mush-rgb-state-light: "255, 95, 210"
  mush-rgb-state-person: "0, 245, 229"
  rgb-state-active-color: "255, 95, 210"
  rgb-state-light-active-color: "255, 95, 210"
  rgb-state-switch-active-color: "255, 95, 210"
  rgb-state-input_boolean-active-color: "255, 95, 210"
  rgb-state-binary_sensor-active-color: "255, 95, 210"
  mini-media-player-accent-color: "#ff5fd2"
  mini-media-player-base-color: "#102638"
  mini-media-player-icon-color: "#00e5d4"

  modes:
    dark:
      color-scheme: "dark"
      ha-color-form-background: "#102638"
      ha-color-form-background-hover: "#173349"
      ha-color-form-background-disabled: "#0d2030"
      ha-color-form-ink-color: "#eefbff"
      md-filled-select-text-field-container-color: "#102638"
      md-filled-select-text-field-hover-container-color: "#173349"
      md-filled-select-text-field-focus-container-color: "#102638"
      md-filled-select-text-field-disabled-container-color: "#0d2030"
      md-filled-select-text-field-input-text-color: "#eefbff"
      md-filled-select-text-field-label-text-color: "#a9dbe5"
      md-filled-select-text-field-supporting-text-color: "#a9dbe5"
      md-filled-select-text-field-trailing-icon-color: "#7ffcff"
      md-filled-select-text-field-focus-active-indicator-color: "#00d7d7"
      md-filled-select-text-field-hover-active-indicator-color: "#00d7d7"
      md-filled-text-field-container-color: "#102638"
      md-filled-text-field-hover-container-color: "#173349"
      md-filled-text-field-focus-container-color: "#102638"
      md-filled-text-field-disabled-container-color: "#0d2030"
      md-filled-text-field-input-text-color: "#eefbff"
      md-filled-text-field-label-text-color: "#a9dbe5"
      md-filled-text-field-supporting-text-color: "#a9dbe5"
      md-filled-text-field-focus-active-indicator-color: "#00d7d7"
      md-filled-text-field-hover-active-indicator-color: "#00d7d7"
      md-menu-container-color: "#102638"
      md-menu-item-label-text-color: "#eefbff"
      md-menu-item-supporting-text-color: "#a9dbe5"
